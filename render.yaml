services:
  - type: web
    name: vibetok
    runtime: node
    plan: free
    buildCommand: corepack enable && corepack prepare pnpm@11 --activate && pnpm install --frozen-lockfile && pnpm build:hosted
    startCommand: pnpm start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: VIBETOK_API_HOST
        value: 0.0.0.0
      - key: VIBETOK_STATIC_DIR
        value: dist
      - key: VIBETOK_DB_PATH
        value: /var/data/vibetok-db.json
    disk:
      name: vibetok-data
      mountPath: /var/data
      sizeGB: 1
