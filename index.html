<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050507" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>VibeTok</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.setTimeout(function () {
        var root = document.getElementById("root");
        if (!root || root.children.length > 0) return;

        root.innerHTML =
          '<main style="min-height:100vh;box-sizing:border-box;display:grid;place-items:center;padding:24px;background:#050507;color:#f7f8fb;font-family:Inter,Arial,sans-serif;">' +
          '<section style="max-width:620px;width:100%;border:1px solid rgba(255,255,255,.16);border-radius:22px;background:#15151c;padding:28px;box-shadow:0 24px 80px rgba(0,0,0,.45);">' +
          '<h1 style="margin:0 0 12px;font-size:28px;line-height:1.15;">VibeTok не запустился</h1>' +
          '<p style="margin:0 0 14px;color:#c9c9d3;font-size:16px;line-height:1.5;">Если ты видишь этот экран на GitHub Pages, значит загружен архив с исходниками, а не готовая собранная версия.</p>' +
          '<p style="margin:0 0 14px;color:#c9c9d3;font-size:16px;line-height:1.5;">Для GitHub Pages загружай содержимое архива <b>UPLOAD_THIS_TO_GITHUB_PAGES.zip</b>. Для общей регистрации, видимых всем аккаунтов, подписчиков и админки загружай <b>VIBETOK_SHARED_FULLSTACK_SOURCE.zip</b> в GitHub-репозиторий и запускай через Render/Node-сервер.</p>' +
          '<p style="margin:0;color:#ff2d78;font-weight:800;font-size:16px;">Белый экран заменен на эту подсказку, чтобы было понятно, что именно открыть.</p>' +
          '</section>' +
          '</main>';
      }, 1800);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
